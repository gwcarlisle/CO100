<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P3 Tracker">
<title>Phase 3 · Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0c0e14; --surface: #161922; --surface2: #1e2230; --surface3: #252a3a;
  --accent: #4ade80; --accent-dim: #162a1e; --accent-dark: #22c55e;
  --blue: #60a5fa; --blue-dim: #111d2e;
  --amber: #fbbf24; --amber-dim: #251b08;
  --red: #f87171; --red-dim: #2a1212;
  --purple: #a78bfa; --purple-dim: #1e1535;
  --teal: #2dd4bf; --teal-dim: #0d2521;
  --text: #e2e6f0; --muted: #64748b; --border: #1e2535;
  --input-bg: #0f1320;
  --radius: 14px; --radius-sm: 8px;
}
html { font-size: 16px; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ── LAYOUT ───────────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* ── TOP NAV ──────────────────────────────────────────────────── */
.topnav { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 14px 10px; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
.topnav-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.app-brand { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; }
.session-clock { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; background: var(--surface2); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); }
.session-clock .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.session-clock.running .dot { background: var(--accent); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

/* WEEK PILLS */
.week-row { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
.week-lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
.week-pills { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; flex: 1; }
.week-pills::-webkit-scrollbar { display: none; }
.wpill { flex-shrink: 0; padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; transition: all .15s; }
.wpill.active { background: var(--purple); color: #fff; border-color: var(--purple); }
.wpill.deload { border-color: var(--amber-dim); color: var(--amber); }
.wpill.active.deload { background: var(--amber); color: #1a0e00; border-color: var(--amber); }

/* DAY TABS */
.day-tabs { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.dtab { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all .15s; }
.dtab.active { background: var(--accent); color: #051a0a; border-color: var(--accent); font-weight: 600; }
.dtab.gym { border-color: var(--blue-dim); }
.dtab.gym.active { background: var(--blue); color: #020d1a; border-color: var(--blue); }
.dtab.done-day { border-color: var(--accent-dim); color: var(--accent); }

/* ── SCROLL CONTENT ───────────────────────────────────────────── */
.scroll-body { flex: 1; overflow-y: auto; padding: 12px 14px 100px; }

/* ── BANNERS ──────────────────────────────────────────────────── */
.banner { border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 12px; font-size: 12px; line-height: 1.6; }
.banner strong { font-weight: 600; display: block; margin-bottom: 2px; }
.banner-blue { background: var(--blue-dim); border: 1px solid #1a3050; color: var(--blue); }
.banner-amber { background: var(--amber-dim); border: 1px solid #3a2a08; color: var(--amber); }
.banner-green { background: var(--accent-dim); border: 1px solid #1a3a20; color: var(--accent); }
.banner-purple { background: var(--purple-dim); border: 1px solid #2a1a4a; color: var(--purple); }

/* NUTRITION STRIP */
.nut-strip { display: flex; gap: 6px; margin-bottom: 14px; }
.nut-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 5px; text-align: center; }
.nut-label { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; margin-bottom: 2px; }
.nut-val { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* ── SECTION ──────────────────────────────────────────────────── */
.section-hdr { display: flex; align-items: center; gap: 8px; margin: 16px 0 9px; }
.section-pill { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: .06em; }
.sp-green { background: var(--accent-dim); color: var(--accent); }
.sp-blue { background: var(--blue-dim); color: var(--blue); }
.sp-amber { background: var(--amber-dim); color: var(--amber); }
.sp-red { background: var(--red-dim); color: var(--red); }
.sp-purple { background: var(--purple-dim); color: var(--purple); }
.sp-teal { background: var(--teal-dim); color: var(--teal); }
.section-note { font-size: 10px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }

/* ── EXERCISE CARD ────────────────────────────────────────────── */
.ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color .2s; }
.ex-card.complete { border-color: var(--accent-dim); }
.ex-header { padding: 12px 14px 10px; cursor: pointer; }
.ex-top { display: flex; align-items: flex-start; gap: 10px; }
.ex-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all .2s; }
.ex-card.complete .ex-check { background: var(--accent); border-color: var(--accent); }
.ex-chk-icon { width: 11px; height: 11px; opacity: 0; transition: opacity .2s; }
.ex-card.complete .ex-chk-icon { opacity: 1; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.ex-card.complete .ex-name { color: var(--accent); }
.ex-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
.chip { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 5px; }
.chip-gray { background: var(--surface2); color: var(--muted); }
.chip-blue { background: var(--blue-dim); color: var(--blue); }
.chip-amber { background: var(--amber-dim); color: var(--amber); }
.chip-purple { background: var(--purple-dim); color: var(--purple); }
.chip-green { background: var(--accent-dim); color: var(--accent); }
.prev-weight { font-size: 10px; color: var(--teal); font-family: 'DM Mono', monospace; margin-top: 2px; }
.ex-expand-btn { font-size: 11px; color: var(--muted); padding: 4px 0; margin-left: auto; flex-shrink: 0; margin-top: 2px; }

/* SET LOGGER */
.set-logger { padding: 0 14px 12px; }
.set-logger-hdr { display: grid; grid-template-columns: 28px 1fr 1fr 44px; gap: 6px; padding: 4px 6px; margin-bottom: 4px; }
.sl-hdr-cell { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 44px; gap: 6px; align-items: center; padding: 5px 6px; border-radius: var(--radius-sm); margin-bottom: 3px; background: var(--surface2); }
.set-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; }
.set-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); width: 100%; text-align: center; -webkit-appearance: none; }
.set-input:focus { outline: none; border-color: var(--blue); }
.set-input::placeholder { color: var(--muted); font-size: 11px; }

/* SET DONE BUTTON — prominent, obviously tappable */
.set-done-btn {
  width: 44px; height: 44px; border-radius: 10px;
  border: 2px solid var(--blue);
  background: var(--blue-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; flex-shrink: 0;
}
.set-done-btn.done {
  background: var(--accent); border-color: var(--accent-dark);
}
.set-done-btn:active { transform: scale(0.88); opacity: .8; }
.set-done-icon { width: 18px; height: 18px; opacity: .35; transition: opacity .2s; }
.set-done-btn.done .set-done-icon { opacity: 1; }
.set-row.done-row { opacity: .65; }
.add-set-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--blue); padding: 6px 6px 0; cursor: pointer; }
.add-set-btn:active { opacity: .7; }

/* NOTES */
.notes-section { padding: 0 14px 12px; }
.notes-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; resize: none; min-height: 52px; line-height: 1.5; }
.notes-input:focus { outline: none; border-color: var(--purple); }
.notes-input::placeholder { color: var(--muted); }

/* ADD EXERCISE */
.add-ex-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: 1px dashed var(--border); border-radius: var(--radius); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; margin-top: 4px; font-family: 'DM Sans', sans-serif; transition: all .15s; }
.add-ex-btn:active { background: var(--surface2); color: var(--text); }

/* CUSTOM EXERCISE MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 20px 16px 36px; border-top: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.modal-field { margin-bottom: 12px; }
.modal-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 5px; display: block; }
.modal-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; }
.modal-input:focus { outline: none; border-color: var(--blue); }
.modal-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn { flex: 1; padding: 13px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; }
.modal-btn-cancel { background: var(--surface2); color: var(--muted); }
.modal-btn-save { background: var(--accent); color: #051a0a; }
.modal-btn:active { transform: scale(0.98); }

/* REST TIMER OVERLAY */
.rest-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 300; display: none; align-items: center; justify-content: center; }
.rest-overlay.open { display: flex; }
.rest-card { background: var(--surface); border-radius: 24px; padding: 32px 24px; text-align: center; min-width: 280px; border: 1px solid var(--border); }
.rest-label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.rest-time { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 500; color: var(--accent); margin-bottom: 6px; line-height: 1; }
.rest-time.urgent { color: var(--amber); }
.rest-time.done { color: var(--red); }
.rest-progress { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.rest-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s linear; }
.rest-bar.urgent { background: var(--amber); }
.rest-preset-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.rest-preset { padding: 6px 14px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); cursor: pointer; }
.rest-preset.active { background: var(--accent); color: #051a0a; border-color: var(--accent); }
.rest-preset:active { transform: scale(0.95); }
.rest-btns { display: flex; gap: 10px; }
.rest-btn { flex: 1; padding: 13px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; }
.rest-skip { background: var(--surface2); color: var(--muted); }
.rest-pause { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue-dim); }
.rest-btn:active { transform: scale(0.97); }

/* COUNTDOWN TIMER (inline, for timed exercises) */
.countdown-row { display: flex; align-items: center; gap: 6px; padding: 6px; border-radius: var(--radius-sm); margin-bottom: 4px; background: var(--surface2); }
.countdown-set-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
.countdown-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); transition: all .15s; }
.countdown-btn.running { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.countdown-btn.done-timer { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.countdown-btn:active { transform: scale(0.97); }
.countdown-progress { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin: 0 4px; }
.countdown-prog-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .5s linear; }
.countdown-prog-fill.urgent { background: var(--amber); }
.countdown-prog-fill.done-fill { background: var(--accent); }
.countdown-row .set-done-btn { flex-shrink: 0; }
.countdown-reset-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); flex-shrink: 0; transition: all .15s; }
.countdown-reset-btn:active { background: var(--surface3); color: var(--amber); transform: scale(0.9); }

/* COMPLETE BANNER */
.done-banner { background: var(--accent); border-radius: var(--radius); padding: 20px 16px; text-align: center; margin-top: 12px; }
.done-banner h3 { font-size: 18px; font-weight: 700; color: #051a0a; margin-bottom: 4px; }
.done-banner p { font-size: 12px; color: #0a3018; line-height: 1.5; }

/* PROGRESS BAR AT BOTTOM OF NAV */
.session-progress { height: 2px; background: var(--surface2); position: relative; margin-top: 10px; border-radius: 1px; overflow: hidden; }
.session-prog-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width .4s; }

/* CARDIO DAY */
.cardio-day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.cardio-day-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.cardio-detail { font-size: 12px; color: var(--muted); line-height: 1.7; white-space: pre-line; }
.cardio-tap-done { border-radius: var(--radius-sm); padding: 14px; text-align: center; cursor: pointer; margin-top: 10px; border: 1px solid var(--border); background: var(--surface2); transition: all .2s; }
.cardio-tap-done.done { background: var(--accent); border-color: var(--accent); }
.cardio-tap-done:active { transform: scale(0.98); }
.cardio-tap-txt { font-size: 14px; font-weight: 600; }
.cardio-tap-done.done .cardio-tap-txt { color: #051a0a; }
.cardio-tap-done:not(.done) .cardio-tap-txt { color: var(--text); }

/* WEEK INFO BOX */
.week-info { background: var(--purple-dim); border: 1px solid #2a1a5a; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 12px; }
.week-info-title { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--purple); font-weight: 500; margin-bottom: 6px; }
.week-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.wi-row { font-size: 11px; color: var(--muted); }
.wi-row span { color: var(--text); font-weight: 500; }

/* WEEK SYNOPSIS */
.week-synopsis { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.ws-title { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--purple); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
.ws-hike-row { display: flex; align-items: stretch; gap: 0; margin-bottom: 12px; background: var(--surface2); border-radius: var(--radius-sm); overflow: hidden; }
.ws-hike-cell { flex: 1; padding: 10px 8px; text-align: center; }
.ws-hike-divider { width: 1px; background: var(--border); flex-shrink: 0; }
.ws-hike-label { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.ws-hike-val { font-size: 17px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 3px; }
.ws-hike-sub { font-size: 10px; color: var(--muted); }
.ws-highlight { font-size: 12px; color: var(--text); line-height: 1.6; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); border-left: 3px solid var(--purple); }

/* MACRO CARD */
.macro-card { border-radius: var(--radius); padding: 14px; margin-bottom: 14px; border: 1px solid; }
.macro-card.training-day { background: #0d1e14; border-color: #1a3a22; }
.macro-card.lowcarb-day { background: #1a1505; border-color: #352a08; }
.macro-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.macro-card-title { font-size: 12px; font-weight: 600; }
.macro-card.training-day .macro-card-title { color: var(--accent); }
.macro-card.lowcarb-day .macro-card-title { color: var(--amber); }
.macro-badge { font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 10px; }
.macro-card.training-day .macro-badge { background: var(--accent-dim); color: var(--accent); }
.macro-card.lowcarb-day .macro-badge { background: var(--amber-dim); color: var(--amber); }
.macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.macro-cell { text-align: center; background: rgba(0,0,0,.25); border-radius: 8px; padding: 8px 4px; }
.macro-cell-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
.macro-cell-lbl { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; margin-top: 2px; letter-spacing: .05em; }
.macro-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
.macro-note strong { font-weight: 500; }

/* CONTENT PROGRESS BAR */
.content-progress-wrap { margin-bottom: 14px; }
.content-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.content-progress-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
.content-progress-pct { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600; color: var(--accent); }
.content-progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.content-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.content-progress-fill.low { background: var(--amber); }

/* SET CHECKOFF — larger, more prominent */

/* NO-WEIGHT set row — 2 col layout */
.set-row-noweight { display: grid; grid-template-columns: 28px 1fr 44px; gap: 6px; align-items: center; padding: 5px 6px; border-radius: var(--radius-sm); margin-bottom: 3px; background: var(--surface2); }
.set-reps-static { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); text-align: center; }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<!-- REST TIMER OVERLAY -->
<div class="rest-overlay" id="restOverlay">
  <div class="rest-card">
    <div class="rest-label">Rest Timer</div>
    <div class="rest-time" id="restDisplay">1:30</div>
    <div class="rest-progress"><div class="rest-bar" id="restBar" style="width:100%"></div></div>
    <div class="rest-preset-row">
      <div class="rest-preset" onclick="setRestPreset(60)">1:00</div>
      <div class="rest-preset active" onclick="setRestPreset(90)" id="preset90">1:30</div>
      <div class="rest-preset" onclick="setRestPreset(120)">2:00</div>
      <div class="rest-preset" onclick="setRestPreset(180)">3:00</div>
    </div>
    <div class="rest-btns">

const STORE_KEY = 'p3tracker_v1';
let S = {};
let activeWeek = 9;
let activeDay = 'mon';
let sessionTimerRunning = false;
let sessionSeconds = 0;
let sessionInterval = null;
let restInterval = null;
let restRemaining = 0;
let restTotal = 90;
let restPaused = false;
let currentRestPreset = 90;

function load() {
  try { S = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { S = {}; }
  activeWeek = parseInt(S._week || 9);
  activeDay = S._day || 'mon';
}
function save() {
  S._week = activeWeek; S._day = activeDay;
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch(e) {}
}

function wdKey(wk, day) { return `w${wk}_${day}`; }
function exKey(wk, day, exId) { return `w${wk}_${day}_${exId}`; }
function prevWtKey(wk, day, exId) {
  // Look for weight used in same exercise last week
  const prevWk = wk - 1;
  if (prevWk < 9) return null;
  const k = `w${prevWk}_${day}_${exId}_lastweight`;
  return S[k] || null;
}

// Get or init exercise session data
function getExData(wk, day, exId, defaultSets, defaultReps) {
  const k = exKey(wk, day, exId);
  if (!S[k]) {
    S[k] = { sets: Array.from({length: defaultSets}, () => ({reps: defaultReps, weight: '', done: false})), notes: '' };
  }
  return S[k];
}

function setExData(wk, day, exId, data) {
  const k = exKey(wk, day, exId);
  S[k] = data;
  // Track last weight used for this exercise (for previous week display)
  const doneSets = data.sets.filter(s => s.done && s.weight);
  if (doneSets.length > 0) {
    S[`${k}_lastweight`] = doneSets[doneSets.length - 1].weight;
  }
  save();
}

// Count completed exercises for progress bar
function countCompleted(wk, day) {
  const days = getDayDef(wk);
  const dayDef = days.find(d => d.id === day);
  if (!dayDef) return { done: 0, total: 0 };
  if (dayDef.type !== 'gym') {
    return { done: S[wdKey(wk,day)+'_complete'] ? 1 : 0, total: 1 };
  }
  const allEx = dayDef.sections.flatMap(s => s.exercises);
  let done = 0, total = allEx.length;
  allEx.forEach(ex => {
    const data = S[exKey(wk, day, ex.id)];
    if (data && data.sets.every(s => s.done)) done++;
  });
  // Check custom exercises
  const customs = S[wdKey(wk,day)+'_custom'] || [];
  total += customs.length;
  customs.forEach(cx => {
    const data = S[exKey(wk, day, cx.id)];
    if (data && data.sets.every(s => s.done)) done++;
  });
  return { done, total };
}

// ═══════════════════════════════════════════════════════════════
// SESSION TIMER
// ═══════════════════════════════════════════════════════════════
function toggleSessionTimer() {
  if (sessionTimerRunning) {
    clearInterval(sessionInterval);
    sessionTimerRunning = false;
    document.getElementById('sessionClock').className = 'session-clock';
  } else {
    sessionTimerRunning = true;
    document.getElementById('sessionClock').className = 'session-clock running';
    sessionInterval = setInterval(() => {
      sessionSeconds++;
      const m = Math.floor(sessionSeconds / 60);
      const s = sessionSeconds % 60;
      document.getElementById('sessionTimeDisplay').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }
}

// ═══════════════════════════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════════════════════════
function openRest() {
  restRemaining = currentRestPreset;
  restTotal = currentRestPreset;
  restPaused = false;
  document.getElementById('restOverlay').className = 'rest-overlay open';
  document.getElementById('restPauseBtn').textContent = 'Pause';
  updateRestDisplay();
  startRestCountdown();
}

function setRestPreset(secs) {
  currentRestPreset = secs;
  restRemaining = secs; restTotal = secs;
  if (restInterval) clearInterval(restInterval);
  document.querySelectorAll('.rest-preset').forEach(p => p.classList.remove('active'));
  const presets = [60, 90, 120, 180];
  document.querySelectorAll('.rest-preset').forEach((p, i) => {
    if (presets[i] === secs) p.classList.add('active');
  });
  updateRestDisplay();
  startRestCountdown();
}

function startRestCountdown() {
  if (restInterval) clearInterval(restInterval);
  restInterval = setInterval(() => {
    if (restPaused) return;
    restRemaining--;
    updateRestDisplay();
    if (restRemaining <= 0) {
      clearInterval(restInterval);
      document.getElementById('restDisplay').className = 'rest-time done';
      document.getElementById('restDisplay').textContent = 'GO!';
      setTimeout(closeRest, 1200);
    }
  }, 1000);
}

function updateRestDisplay() {
  const m = Math.floor(restRemaining / 60);
  const s = restRemaining % 60;
  const disp = document.getElementById('restDisplay');
  const bar = document.getElementById('restBar');
  disp.textContent = `${m}:${String(s).padStart(2,'0')}`;
  const pct = (restRemaining / restTotal) * 100;
  bar.style.width = pct + '%';
  if (restRemaining <= 20) {
    disp.className = 'rest-time urgent';
    bar.className = 'rest-bar urgent';
  } else {
    disp.className = 'rest-time';
    bar.className = 'rest-bar';
  }
}

function toggleRestPause() {
  restPaused = !restPaused;
  document.getElementById('restPauseBtn').textContent = restPaused ? 'Resume' : 'Pause';
}

function closeRest() {
  if (restInterval) clearInterval(restInterval);
  document.getElementById('restOverlay').className = 'rest-overlay';
}

// ═══════════════════════════════════════════════════════════════
// INLINE COUNTDOWN TIMERS (for timed exercises)
// ═══════════════════════════════════════════════════════════════
const activeCountdowns = {}; // { timerId: { interval, remaining, total } }

function resetCountdown(exId, setIdx, totalSecs) {
  const timerId = `cd_${exId}_${setIdx}`;
  // Stop any running countdown
  if (activeCountdowns[timerId]) {
    clearInterval(activeCountdowns[timerId].interval);
    delete activeCountdowns[timerId];
  }
  // Re-render the card to restore fresh timer state (also un-does auto-complete if timer ran out)
  const ex = findEx(exId);
  if (!ex) return;
  // If the set was auto-completed by the timer, un-complete it
  const data = getExData(activeWeek, activeDay, exId, ex.targetSets, ex.targetReps);
  if (data.sets[setIdx].done) {
    data.sets[setIdx].done = false;
    setExData(activeWeek, activeDay, exId, data);
  }
  const card = document.getElementById('card_' + exId);
  if (card) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderExCard(ex, activeWeek, activeDay);
    card.replaceWith(tmp.firstElementChild);
  }
  renderProgress();
}

function startCountdown(exId, setIdx, totalSecs) {
  const timerId = `cd_${exId}_${setIdx}`;
  const btn = document.getElementById(timerId);
  const fill = document.getElementById(timerId + '_fill');
  const labelEl = document.getElementById(timerId + '_label');
  if (!btn || !fill || !labelEl) return;

  // If already running, pause it
  if (activeCountdowns[timerId] && activeCountdowns[timerId].running) {
    clearInterval(activeCountdowns[timerId].interval);
    activeCountdowns[timerId].running = false;
    btn.className = 'countdown-btn';
    const rem = activeCountdowns[timerId].remaining;
    const m = Math.floor(rem/60), s = rem%60;
    labelEl.textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')} (paused)` : `${rem}s (paused)`;
    return;
  }

  // Initialize or resume
  if (!activeCountdowns[timerId]) {
    activeCountdowns[timerId] = { remaining: totalSecs, total: totalSecs, running: false };
  }

  const cd = activeCountdowns[timerId];
  cd.running = true;
  btn.className = 'countdown-btn running';

  cd.interval = setInterval(() => {
    cd.remaining--;
    const m = Math.floor(cd.remaining/60), s = cd.remaining%60;
    const label = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${cd.remaining}s`;
    if (labelEl) labelEl.textContent = label;

    const pct = (cd.remaining / cd.total) * 100;
    if (fill) {
      fill.style.width = pct + '%';
      fill.className = 'countdown-prog-fill' + (cd.remaining <= 10 ? ' urgent' : '');
    }

    if (cd.remaining <= 0) {
      clearInterval(cd.interval);
      cd.running = false;
      delete activeCountdowns[timerId];
      // Auto-mark set complete and re-render the card cleanly
      const ex2 = findEx(exId);
      if (ex2) {
        const data2 = getExData(activeWeek, activeDay, exId, ex2.targetSets, ex2.targetReps);
        data2.sets[setIdx].done = true;
        setExData(activeWeek, activeDay, exId, data2);
        const card2 = document.getElementById('card_' + exId);
        if (card2) {
          const tmp = document.createElement('div');
          tmp.innerHTML = renderExCard(ex2, activeWeek, activeDay);
          card2.replaceWith(tmp.firstElementChild);
        }
        renderProgress();
        renderDayTabs();
      }
    }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderWeekPills() {
  document.getElementById('weekPills').innerHTML = Object.entries(WEEK_META).map(([wk, m]) =>
    `<div class="wpill ${parseInt(wk)===activeWeek?'active':''} ${m.deload?'deload':''}" onclick="switchWeek(${wk})">${m.label}</div>`
  ).join('');
}

function renderDayTabs() {
  const days = getDayDef(activeWeek);
  document.getElementById('dayTabs').innerHTML = days.map(d => {
    const {done, total} = countCompleted(activeWeek, d.id);
    const isDone = done === total && total > 0;
    return `<div class="dtab ${d.id===activeDay?'active':''} ${d.type==='gym'?'gym':''} ${isDone&&d.id!==activeDay?'done-day':''}" onclick="switchDay('${d.id}')">${d.label}</div>`;
  }).join('');
}

function renderProgress() {
  const {done, total} = countCompleted(activeWeek, activeDay);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('sessProgFill').style.width = pct + '%';
}

function renderBody() {
  const days = getDayDef(activeWeek);
  const day = days.find(d => d.id === activeDay);
  const w = WEEK_META[activeWeek];
  const el = document.getElementById('scrollBody');

  if (day.type !== 'gym') {
    renderCardioDay(el, day, w);
    return;
  }
  renderGymDay(el, day, w);
}

function renderCardioDay(el, day, w) {
  const isDone = !!S[wdKey(activeWeek, activeDay)+'_complete'];
  const emoji = day.type === 'hike' ? '🥾' : day.id === 'fri' ? '🚶' : '🚶';
  el.innerHTML = `
    ${renderMacroCard(activeWeek, activeDay)}
    ${renderContentProgress(activeWeek, activeDay)}
    ${renderWeekSynopsis(activeWeek)}
    ${w.deload ? '<div class="banner banner-amber"><strong>⚠️ Deload Week</strong>Reduce all effort 20-25%. Hike shorter distance, lighter pack. Mandatory for tissue adaptation.</div>' : ''}
    <div class="cardio-day-card">
      <div class="cardio-day-title">${day.title}</div>
      <div class="cardio-detail">${day.note}</div>
    </div>
    <div class="cardio-tap-done ${isDone?'done':''}" onclick="toggleCardioComplete()">
      <div style="font-size:26px;margin-bottom:6px">${isDone?'✅':emoji}</div>
      <div class="cardio-tap-txt">${isDone?'Complete — great work!':'Tap when done'}</div>
    </div>`;
}

function renderGymDay(el, day, w) {
  const {done, total} = countCompleted(activeWeek, activeDay);
  let html = '';

  // Macro card + progress bar at top
  html += renderMacroCard(activeWeek, activeDay);
  html += renderContentProgress(activeWeek, activeDay);
  html += renderWeekSynopsis(activeWeek);

  if (w.deload) html += `<div class="banner banner-amber"><strong>⚠️ DELOAD WEEK</strong>Same exercises, same reps — reduce all weights 20-25%. This is how your body consolidates 4 weeks of adaptation.</div>`;

  html += `<div class="banner banner-green"><strong>MCL Warm-Up is first</strong>Clamshells → TKEs → Glute Bridges → Hip Flexor Stretch → Tibialis Raises. Every session, every week. Non-negotiable.</div>`;

  // Sections
  day.sections.forEach(sec => {
    html += `<div class="section-hdr">
      <span class="section-pill ${sec.pill}">${sec.label}</span>
    </div>`;
    sec.exercises.forEach(ex => {
      html += renderExCard(ex, activeWeek, activeDay);
    });
  });

  // Custom exercises
  const customs = S[wdKey(activeWeek, activeDay)+'_custom'] || [];
  if (customs.length > 0) {
    html += `<div class="section-hdr"><span class="section-pill sp-teal">Custom Exercises</span></div>`;
    customs.forEach(cx => { html += renderExCard(cx, activeWeek, activeDay, true); });
  }

  html += `<button class="add-ex-btn" onclick="openModal()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Add Custom Exercise
  </button>`;

  if (done === total && total > 0) {
    html += `<div class="done-banner"><h3>Session Complete! 💪</h3><p>Log it in Hevy · post-workout protein within 45 min · rest timer is your friend between sets.</p></div>`;
  }

  el.innerHTML = html;
}

function renderExCard(ex, wk, day, isCustom = false) {
  const data = getExData(wk, day, ex.id, ex.targetSets, ex.targetReps);
  const allDone = data.sets.length > 0 && data.sets.every(s => s.done);
  const prevWt = prevWtKey(wk, day, ex.id);

  let chipsHtml = (ex.chips || []).map(c => `<span class="chip chip-${c.c}">${c.t}</span>`).join('');

  let html = `<div class="ex-card ${allDone?'complete':''}" id="card_${ex.id}">
    <div class="ex-header" onclick="toggleExExpand('${ex.id}')">
      <div class="ex-top">
        <div class="ex-check">
          <svg class="ex-chk-icon" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#051a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}${isCustom?' <span style="font-size:10px;color:var(--teal);font-family:DM Mono">CUSTOM</span>':''}</div>
          <div class="ex-chips">${chipsHtml}</div>
          ${prevWt ? `<div class="prev-weight">↑ Last week: ${prevWt} lbs</div>` : ''}
        </div>
        <div class="ex-expand-btn">›</div>
      </div>
    </div>`;

  // Set logger
  const isTimed = !!ex.timedSeconds;
  html += `<div class="set-logger" id="logger_${ex.id}">`;

  if (isTimed) {
    // Timed exercise — countdown rows with start + reset + checkmark
    html += `<div style="padding:0 6px 4px;font-size:10px;color:var(--amber);font-family:'DM Mono',monospace;">⏱ Tap to start · tap again to pause · reset ↺ to restart</div>`;
    data.sets.forEach((set, i) => {
      const timerId = `cd_${ex.id}_${i}`;
      const totalSec = ex.timedSeconds;
      const m = Math.floor(totalSec/60), s = totalSec%60;
      const label = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${totalSec}s`;
      html += `<div class="countdown-row ${set.done?'done-row':''}" id="setrow_${ex.id}_${i}">
        <div class="countdown-set-num">${i+1}</div>
        <button class="countdown-btn ${set.done?'done-timer':''}" id="${timerId}" onclick="startCountdown('${ex.id}',${i},${ex.timedSeconds})">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 4v3l2 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span id="${timerId}_label">${set.done ? 'Done ✓' : label}</span>
        </button>
        <div class="countdown-progress" id="${timerId}_bar" style="${set.done?'display:none':''}">
          <div class="countdown-prog-fill ${set.done?'done-fill':''}" id="${timerId}_fill" style="width:${set.done?'100%':'0%'}"></div>
        </div>
        <button class="countdown-reset-btn" onclick="resetCountdown('${ex.id}',${i},${ex.timedSeconds})" title="Reset timer">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5A4.5 4.5 0 106.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 2.5V6.5H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="set-done-btn ${set.done?'done':''}" onclick="toggleSetDone('${ex.id}',${i})">
          <svg class="set-done-icon" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="${set.done?'#051a0a':'#93c5fd'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>`;
    });
  } else {
    // Standard weight/reps exercise
    html += `<div class="set-logger-hdr">
      <div class="sl-hdr-cell">Set</div>
      ${ex.noWeight ? '' : '<div class="sl-hdr-cell">Weight (lbs)</div>'}
      <div class="sl-hdr-cell">Reps</div>
      <div class="sl-hdr-cell"></div>
    </div>`;
    data.sets.forEach((set, i) => {
      const rowClass = ex.noWeight ? 'set-row-noweight' : 'set-row';
      html += `<div class="${rowClass} ${set.done?'done-row':''}" id="setrow_${ex.id}_${i}">
        <div class="set-num">${i+1}</div>
        ${ex.noWeight ? '' : `<input class="set-input" type="number" inputmode="decimal" placeholder="lbs" value="${set.weight||''}"
          onchange="updateSetWeight('${ex.id}',${i},this.value)" oninput="updateSetWeight('${ex.id}',${i},this.value)">`}
        <div class="set-reps-static">${ex.targetReps || '—'}</div>
        <div class="set-done-btn ${set.done?'done':''}" onclick="toggleSetDone('${ex.id}',${i})">
          <svg class="set-done-icon" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="${set.done?'#051a0a':'#93c5fd'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>`;
    });
  }

  html += `<div class="add-set-btn" onclick="addSet('${ex.id}')">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"/></svg>
    Add set
  </div>`;
  html += `</div>`; // end set-logger

  // Notes
  html += `<div class="notes-section">
    <textarea class="notes-input" placeholder="Notes (form cues, weight felt, how you felt...)" rows="2"
      onchange="updateNotes('${ex.id}',this.value)" oninput="updateNotes('${ex.id}',this.value)">${data.notes||''}</textarea>
  </div>`;

  if (ex.note) {
    html += `<div style="padding:0 14px 10px;font-size:11px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:8px;">${ex.note}</div>`;
  }

  html += `</div>`; // end ex-card
  return html;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function toggleExExpand(exId) {
  const logger = document.getElementById('logger_' + exId);
  if (logger) {
    logger.style.display = logger.style.display === 'none' ? '' : 'none';
  }
}

function updateSetWeight(exId, setIdx, val) {
  const ex = findEx(exId);
  if (!ex) return;
  const data = getExData(activeWeek, activeDay, exId, ex.targetSets, ex.targetReps);
  data.sets[setIdx].weight = val;
  setExData(activeWeek, activeDay, exId, data);
}

function updateSetReps(exId, setIdx, val) {
  const ex = findEx(exId);
  if (!ex) return;
  const data = getExData(activeWeek, activeDay, exId, ex.targetSets, ex.targetReps);
  data.sets[setIdx].reps = val;
  setExData(activeWeek, activeDay, exId, data);
}

function toggleSetDone(exId, setIdx) {
  const ex = findEx(exId);
  if (!ex) return;
  const data = getExData(activeWeek, activeDay, exId, ex.targetSets, ex.targetReps);
  data.sets[setIdx].done = !data.sets[setIdx].done;
  setExData(activeWeek, activeDay, exId, data);

  // Re-render the entire card so all row types (timed/noWeight/standard) stay correct
  const card = document.getElementById('card_' + exId);
  if (card) {
    const newCardHtml = renderExCard(ex, activeWeek, activeDay);
    const tmp = document.createElement('div');
    tmp.innerHTML = newCardHtml;
    card.replaceWith(tmp.firstElementChild);
  }

  if (data.sets[setIdx].done && !ex.timedSeconds) openRest();
  renderProgress();
  renderDayTabs();
  // Update the inline progress bar without full re-render
  const pw = document.querySelector('.content-progress-wrap');
  if (pw) pw.outerHTML = renderContentProgress(activeWeek, activeDay);
}

function addSet(exId) {
  const ex = findEx(exId);
  if (!ex) return;
  const data = getExData(activeWeek, activeDay, exId, ex.targetSets, ex.targetReps);
  data.sets.push({ reps: ex.targetReps || 10, weight: '', done: false });
  setExData(activeWeek, activeDay, exId, data);
  renderAll();
}

function updateNotes(exId, val) {
  const ex = findEx(exId);
  if (!ex) return;
  const data = getExData(activeWeek, activeDay, exId, ex.targetSets, ex.targetReps);
  data.notes = val;
  setExData(activeWeek, activeDay, exId, data);
}

function findEx(exId) {
  const days = getDayDef(activeWeek);
  const day = days.find(d => d.id === activeDay);
  if (!day || !day.sections) return null;
  for (const sec of day.sections) {
    const found = sec.exercises.find(e => e.id === exId);
    if (found) return found;
  }
  const customs = S[wdKey(activeWeek, activeDay)+'_custom'] || [];
  return customs.find(c => c.id === exId) || null;
}

function toggleCardioComplete() {
  const k = wdKey(activeWeek, activeDay) + '_complete';
  S[k] = !S[k];
  save();
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// CUSTOM EXERCISE
// ═══════════════════════════════════════════════════════════════
function openModal() {
  document.getElementById('newExName').value = '';
  document.getElementById('newExEquip').value = '';
  document.getElementById('newExSets').value = 3;
  document.getElementById('newExReps').value = 10;
  document.getElementById('newExWeight').value = '';
  document.getElementById('addModal').className = 'modal-overlay open';
}

function closeModal() {
  document.getElementById('addModal').className = 'modal-overlay';
}

function saveNewEx() {
  const name = document.getElementById('newExName').value.trim();
  if (!name) return;
  const sets = parseInt(document.getElementById('newExSets').value) || 3;
  const reps = parseInt(document.getElementById('newExReps').value) || 10;
  const weight = document.getElementById('newExWeight').value;
  const equip = document.getElementById('newExEquip').value.trim();
  const id = 'custom_' + Date.now();
  const newEx = {
    id, name, targetSets: sets, targetReps: reps, equip,
    chips:[{t:`${sets} sets`,c:'gray'},{t:`${reps} reps`,c:'gray'}],
    note: equip
  };
  const k = wdKey(activeWeek, activeDay) + '_custom';
  if (!S[k]) S[k] = [];
  S[k].push(newEx);
  // Pre-fill weight if provided
  if (weight) {
    const exData = { sets: Array.from({length:sets},()=>({reps,weight,done:false})), notes:'' };
    setExData(activeWeek, activeDay, id, exData);
  }
  save();
  closeModal();
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function switchWeek(wk) {
  activeWeek = parseInt(wk);
  save();
  renderAll();
  document.getElementById('scrollBody').scrollTop = 0;
}

function switchDay(id) {
  activeDay = id;
  save();
  renderAll();
  document.getElementById('scrollBody').scrollTop = 0;
}

function renderAll() {
  renderWeekPills();
  renderDayTabs();
  renderProgress();
  renderBody();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
load();
renderAll();
</script>
